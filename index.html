<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Ultra Web Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .terminal { background: #000; border: 1px solid #334155; height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.85rem; border-radius: 8px; }
        .btn-cmd { background: #334155; transition: all 0.2s; border: 1px solid #475569; }
        .btn-cmd:hover { background: #475569; transform: translateY(-1px); }
        .btn-cmd:active { transform: translateY(1px); }
    </style>
</head>
<body class="p-4 bg-slate-950">

    <div class="max-w-lg mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black text-blue-500 tracking-tight">CHAMELEON <span class="text-white">ULTRA</span></h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Web Bluetooth Interface</p>
        </header>

        <div class="bg-slate-900 rounded-2xl p-5 shadow-2xl mb-6 border border-slate-800">
            <div class="flex items-center justify-between">
                <div>
                    <div class="flex items-center gap-2">
                        <span id="status-dot" class="h-3 w-3 rounded-full bg-red-500 animate-pulse"></span>
                        <span id="status-text" class="text-lg font-bold">Disconnesso</span>
                    </div>
                    <p id="device-name" class="text-xs text-slate-500 mt-1">Nessun dispositivo rilevato</p>
                </div>
                <button id="connect-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
                    CONNETTI
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="sendChameleonCommand(1000)" class="btn-cmd p-4 rounded-xl text-sm font-semibold text-blue-300">
                📄 Get Version
            </button>
            <button onclick="sendChameleonCommand(1002)" class="btn-cmd p-4 rounded-xl text-sm font-semibold text-green-300">
                🔋 Battery Level
            </button>
            <button onclick="sendChameleonCommand(1001)" class="btn-cmd p-4 rounded-xl text-sm font-semibold text-purple-300">
                🆔 Get Git Info
            </button>
            <button onclick="clearLog()" class="btn-cmd p-4 rounded-xl text-sm font-semibold text-slate-400">
                🗑️ Clear Terminal
            </button>
        </div>

        <div class="relative">
            <div class="terminal p-4 shadow-inner" id="terminal">
                <div class="text-blue-900 font-bold mb-2 uppercase text-[10px] tracking-widest">System Logs Output</div>
            </div>
        </div>
        
        <p class="text-[10px] text-slate-600 mt-4 text-center italic">
            Assicurati che il Bluetooth sia attivo e Bluefy abbia i permessi necessari.
        </p>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let device, txChar, rxChar;

        const btn = document.getElementById('connect-btn');
        const stText = document.getElementById('status-text');
        const stDot = document.getElementById('status-dot');
        const term = document.getElementById('terminal');

        function log(msg, type = 'info') {
            const colors = {
                in: 'text-emerald-400',
                out: 'text-amber-400',
                error: 'text-red-500 font-bold',
                info: 'text-slate-400'
            };
            const div = document.createElement('div');
            div.className = colors[type] || 'text-slate-300';
            div.innerHTML = `<span class="opacity-50 text-[10px] mr-2">${new Date().toLocaleTimeString().split(' ')[0]}</span> ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function connect() {
            try {
                log("Avvio scansione...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE_UUID]
                });

                stText.innerText = "Sincronizzazione...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txChar = await service.getCharacteristic(TX_UUID);
                rxChar = await service.getCharacteristic(RX_UUID);

                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(val).map(b => b.toString(16).padStart(2, '0')).join(' ');
                    log(`<- RECV: ${hex}`, 'in');
                });

                stText.innerText = "Online";
                stDot.classList.replace('bg-red-500', 'bg-green-500');
                stDot.classList.remove('animate-pulse');
                document.getElementById('device-name').innerText = device.name;
                btn.innerText = "DISCONNETTI";
                log("Connessione stabilita con successo!", "info");

            } catch (err) {
                log("Errore: " + err.message, "error");
                stText.innerText = "Disconnesso";
            }
        }

        async function sendChameleonCommand(cmdId, dataArray = []) {
            if (!txChar) return log("Connetti il dispositivo prima!", "error");

            // Formato Frame Chameleon: Header(2) + Cmd(2) + Len(2) + Data(n) + LRC(1)
            const header = [0x11, 0xEF];
            const cmd = [cmdId & 0xFF, (cmdId >> 8) & 0xFF];
            const len = [dataArray.length & 0xFF, (dataArray.length >> 8) & 0xFF];
            
            let frame = [...header, ...cmd, ...len, ...dataArray];
            
            // Calcolo Checksum (LRC)
            let lrc = 0;
            for (let byte of frame) lrc ^= byte;
            frame.push(lrc);

            const buffer = new Uint8Array(frame);
            await txChar.writeValue(buffer);
            log(`-> SEND CMD ${cmdId}: ${Array.from(buffer).map(b => b.toString(16).padStart(2, '0')).join(' ')}`, "out");
        }

        btn.addEventListener('click', () => {
            if (device?.gatt.connected) {
                device.gatt.disconnect();
                location.reload(); // Reset semplice
            } else {
                connect();
            }
        });

        function clearLog() { term.innerHTML = ''; }
    </script>
</body>
</html>
