<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Pro - Chameleon Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; }
        .terminal { background: #000; border: 1px solid #30363d; height: 200px; overflow-y: auto; font-size: 11px; color: #8b949e; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-500 italic">MICROEL <span class="text-white font-light text-sm uppercase tracking-widest">Ultra Link</span></h1>
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-all active:scale-95">
                CONNETTI
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="box p-3"><label class="block text-[10px] text-gray-500 uppercase">Credito</label><span id="d-cred" class="text-xl font-bold text-green-400">-- €</span></div>
            <div class="box p-3"><label class="block text-[10px] text-gray-500 uppercase">Operazioni</label><span id="d-op" class="text-xl font-bold text-orange-400">--</span></div>
            <div class="box p-3"><label class="block text-[10px] text-gray-500 uppercase">Tot. Ingr.</label><span id="d-tot" class="text-xl font-bold text-blue-400">-- €</span></div>
            <div class="box p-3"><label class="block text-[10px] text-gray-500 uppercase">UID</label><span id="d-uid" class="text-[10px] font-bold block mt-2 tracking-tighter text-slate-400">--</span></div>
        </div>

        <div class="box p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="amountSel" class="bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none text-sm">
                    <option value="100">1.00 €</option>
                    <option value="500">5.00 €</option>
                    <option value="1000" selected>10.00 €</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="startAnalyze()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg text-xs">ANALISI</button>
                    <button onclick="startReload()" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg text-xs uppercase">Ricarica</button>
                </div>
            </div>
        </div>

        <div id="terminal" class="terminal p-4 rounded-lg shadow-inner">
            <div class="text-slate-600 italic text-[9px] mb-2">Attesa connessione...</div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let tx, rx, device;

        // --- Logica Calcolo Chiavi (Source: 14, 15) ---
        function deriveKeys(uid) {
            let sommaUID = uid.reduce((a, b) => a + b, 0);
            let b6_v = sommaUID & 0xFF;
            let b7_k = (b6_v >> 4) & 0x0F;
            let b8_k = b6_v & 0x0F;
            let cond = (b7_k==0x0 || (b7_k==0x1 && b8_k!=0xF) || b7_k==0x4 || (b7_k==0x5 && b8_k!=0xF) || b7_k==0x8 || (b7_k==0x9 && b8_k!=0xF) || b7_k==0xC || (b7_k==0xD && b8_k!=0xF) || b6_v==0x3F || b6_v==0x7F || b6_v==0xBF || b6_v==0xFF);
            let kByte = cond ? (b6_v + 1) : (b6_v + 0x41);
            let kA = [kByte, kByte ^ 0x93, kByte ^ 0xA6, kByte ^ 0x74, kByte ^ 0x2A, kByte ^ 0xF8];
            return kA;
        }

        // --- Decodifica Microel (Source: 2, 20, 21, 23) ---
        function parseBlock4(block) {
            const op = (block[1] << 8) | block[0];
            const tot = ((block[3] << 8) | block[2]) / 10.0;
            const cred = ((block[6] << 8) | block[5]) / 100.0;
            
            document.getElementById('d-cred').innerText = cred.toFixed(2) + " €";
            document.getElementById('d-op').innerText = op;
            document.getElementById('d-tot').innerText = tot.toFixed(1) + " €";
            log(`DECODED: Credito ${cred}€, Operazioni ${op}`, "text-green-400");
        }

        function log(msg, color = "text-slate-500") {
            const t = document.getElementById('terminal');
            t.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        async function connect() {
            try {
                log("Apertura selettore Bluetooth...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                tx = await service.getCharacteristic(TX_UUID);
                rx = await service.getCharacteristic(RX_UUID);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const val = new Uint8Array(e.target.value.buffer);
                    log("<- " + Array.from(val).map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase());
                };

                log("CONNESSO!", "text-blue-400 font-bold");
                document.getElementById('btn-connect').innerText = "ONLINE";
                document.getElementById('btn-connect').className = "bg-green-600 text-white px-6 py-2 rounded-lg font-bold";
            } catch (err) {
                log("ERRORE: " + err.message, "text-red-500");
            }
        }

        async function startAnalyze() {
            if(!tx) return log("Non connesso!", "text-red-500");
            log("Richiesta SCAN HF (UID)...", "text-yellow-500");
            // Comando Chameleon per Scan UID (11 EF F6 03...)
        }

        document.getElementById('btn-connect').onclick = connect;
    </script>
</body>
</html>
