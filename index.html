<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Ultra - Coges Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: monospace; }
        .terminal { background: #000; border: 1px solid #334155; height: 350px; overflow-y: auto; padding: 10px; font-size: 0.75rem; }
        .btn { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:active { background: #334155; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-blue-400">Chameleon V1-Modified</h1>

        <div class="grid gap-4 mb-4">
            <button id="connect-btn" class="btn bg-blue-600 border-none">1. CONNETTI</button>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="sendHex('11ef03e80000f6')" class="btn text-blue-300">Info Versione</button>
                <button onclick="sendHex('11ef03ea0000f4')" class="btn text-green-300">Info Batteria</button>
            </div>

            <button onclick="scanCoges()" class="btn bg-orange-600/50 text-orange-200 border-orange-500">
                🔍 SCAN COGES (14443B)
            </button>
        </div>

        <div class="terminal mb-2" id="terminal">
            <div class="text-slate-500 italic">-- Log di sistema --</div>
        </div>
        
        <button onclick="document.getElementById('terminal').innerHTML=''" class="text-[10px] underline text-slate-500">Pulisci Log</button>
    </div>

    <script>
        const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHAR = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_CHAR = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let device, tx, rx;

        function log(msg, color = "text-slate-400") {
            const div = document.createElement('div');
            div.className = color;
            div.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
            document.getElementById('terminal').appendChild(div);
            document.getElementById('terminal').scrollTop = 9999;
        }

        async function connect() {
            try {
                log("Ricerca...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [UART_SERVICE]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE);
                tx = await service.getCharacteristic(TX_CHAR);
                rx = await service.getCharacteristic(RX_CHAR);

                await rx.startNotifications();
                rx.addEventListener('characteristicvaluechanged', (e) => {
                    let hex = Array.from(new Uint8Array(e.target.value.buffer))
                                   .map(b => b.toString(16).padStart(2, '0')).join(' ');
                    log(`<- ${hex.toUpperCase()}`, "text-green-400");
                });

                log("CONNESSO!", "text-blue-400 font-bold");
                document.getElementById('connect-btn').innerText = "DISCONNETTI";
            } catch (err) {
                log("Errore: " + err, "text-red-500");
            }
        }

        async function sendHex(hexStr) {
            if (!tx) return log("NON CONNESSO", "text-red-500");
            const bytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            await tx.writeValue(bytes);
            log(`-> ${hexStr.toUpperCase()}`, "text-slate-500");
        }

        async function scanCoges() {
            log("Avvio scansione ISO 14443-B...", "text-orange-400");
            
            // In questa versione usiamo i comandi HEX "pre-calcolati" per evitare errori di checksum
            // 1. Reset/Antenna ON (11 EF 03 F0 01 00 01 f4) - Esempio CMD_SET_ANTENNA_ON
            await sendHex('11ef03f0010001f4'); 
            await new Promise(r => setTimeout(r, 100));

            // 2. Scan B (11 EF 03 F6 01 00 02 f3) - CMD_HF_SCAN con parametro 02
            // Questo comando accenderà il LED e cercherà la chiave
            await sendHex('11ef03f6010002f3');
        }

        document.getElementById('connect-btn').onclick = () => {
            if (device?.gatt.connected) { device.gatt.disconnect(); location.reload(); }
            else { connect(); }
        };
    </script>
</body>
</html>
