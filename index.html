<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel USB - Chameleon Ultra Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; }
        .terminal { background: #000; border: 1px solid #003b00; height: 300px; overflow-y: auto; padding: 10px; font-size: 12px; box-shadow: inset 0 0 10px #003b00; }
        button { transition: all 0.2s; border: 1px solid #00ff41; }
        button:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-4 uppercase tracking-tighter">Chameleon Ultra [USB SERIAL MODE]</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button id="btn-usb" class="p-4 font-bold bg-transparent">1. COLLEGA USB</button>
            <button onclick="startMifareScan()" class="p-4 font-black bg-green-900/20">2. SCANSIONE (LED)</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="border border-zinc-800 p-4">
                <div class="text-[10px] text-zinc-500 uppercase">UID</div>
                <div id="uid-display" class="text-lg font-bold">-- -- -- --</div>
            </div>
            <div class="border border-zinc-800 p-4">
                <div class="text-[10px] text-zinc-500 uppercase">Microel Key A</div>
                <div id="key-display" class="text-lg font-bold text-orange-500">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="log" class="terminal mb-2">Attesa collegamento USB...</div>
    </div>

    <script>
        let port;
        let reader;
        let writer;

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // Calcolo chiave Microel dal tuo sketch .ino
        function deriveKey(uid) {
            let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
            let b7 = (sum >> 4) & 0x0F; let b8 = sum & 0x0F;
            let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||sum==63||sum==127||sum==191||sum==255);
            let k = cond ? (sum + 1) : (sum + 65);
            return [k, k^147, k^166, k^116, k^42, k^248];
        }

        document.getElementById('btn-usb').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                
                document.getElementById('btn-usb').innerText = "✅ USB OK";
                log("CONNESSO VIA USB.");
                readLoop();
            } catch (e) { log("ERRORE USB: " + e.message); }
        };

        async function readLoop() {
            while (port.readable) {
                reader = port.readable.getReader();
                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        const hex = Array.from(value).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
                        log("RX: " + hex);
                        
                        // Cerca header UID nel flusso (Protocollo 11 EF 14)
                        if (hex.includes("11EF14")) {
                            const idx = hex.indexOf("11EF14");
                            const uidHex = hex.substring(idx + 12, idx + 20);
                            const uidArr = uidHex.match(/.{1,2}/g).map(h => parseInt(h, 16));
                            
                            document.getElementById('uid-display').innerText = uidHex.match(/.{1,2}/g).join(' ');
                            const key = deriveKey(uidArr);
                            document.getElementById('key-display').innerText = key.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                        }
                    }
                } catch (e) { log("ERRORE LETTURA: " + e.message); } finally { reader.releaseLock(); }
            }
        }

        async function startMifareScan() {
            if (!writer) return;
            log("INVIO COMANDI DI SCANSIONE...");
            
            // Pacchetti RAW (Modalità Reader + Antenna ON + Scan)
            const cmds = [
                "11EFE803010001F5", // Reader Mode
                "11EFF003010001ED", // Antenna ON
                "11EFF603010001E7"  // Scan HF
            ];

            for (let hex of cmds) {
                const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(h => parseInt(h, 16)));
                await writer.write(bytes);
                await new Promise(r => setTimeout(r, 100));
            }
        }
    </script>
</body>
</html>
