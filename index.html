<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Pro - Chameleon Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', monospace; }
        .terminal { background: #000; border: 1px solid #30363d; height: 180px; overflow-y: auto; font-size: 11px; color: #8b949e; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .btn-action { @apply bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-all disabled:opacity-30; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-500 italic">
                MICROEL <span class="text-white font-light">ULTRA</span>
            </h1>
            <div class="flex gap-2">
                <button id="btn-connect" class="btn-action">CONNETTI</button>
                <button id="btn-read" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg font-bold transition-all disabled:opacity-30" disabled>LEGGI MIFARE</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="box p-4 border-l-4 border-blue-500">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">UID</div>
                <div id="uid-display" class="text-xl font-mono text-white tracking-widest">-- -- -- --</div>
            </div>
            <div class="box p-4 border-l-4 border-orange-500">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Microel Key A</div>
                <div id="key-display" class="text-xl font-mono text-orange-400">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="terminal" class="terminal p-4 rounded-lg shadow-inner">
            <div class="text-yellow-600 italic uppercase text-[9px] mb-2 tracking-widest">Console Output</div>
        </div>
    </div>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let tx = null;

function log(msg, color = "text-slate-400") {
    const term = document.getElementById('terminal');
    term.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    term.scrollTop = term.scrollHeight;
}

// Formula Microel Key A
function getMicroelKey(uid) {
    let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
    let b7 = (sum >> 4) & 0x0F, b8 = sum & 0x0F;
    let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||sum==63||sum==127||sum==191||sum==255);
    let k = cond ? (sum + 1) : (sum + 65);
    return [k, k^147, k^166, k^116, k^42, k^248];
}

async function connect() {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'Chameleon' }],
            optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        tx = await service.getCharacteristic(TX_UUID);
        const rx = await service.getCharacteristic(RX_UUID);

        await rx.startNotifications();
        rx.addEventListener('characteristicvaluechanged', handleRx);

        log("CONNESSO", "text-green-400 font-bold");
        document.getElementById('btn-read').disabled = false;
        document.getElementById('btn-connect').innerText = "ONLINE";
    } catch (e) { log("ERRORE: " + e.message, "text-red-500"); }
}

async function sendCommand(cmd, data = []) {
    // Protocollo Chameleon Ultra: Header(11 EF) + CMD(2b) + LEN(2b) + DATA + LRC
    let pkt = [0x11, 0xEF, cmd & 0xFF, (cmd >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF, ...data];
    let lrc = pkt.reduce((acc, b) => acc ^ b, 0);
    pkt.push(lrc);
    
    log(`-> TX CMD ${cmd}`, "text-purple-400");
    await tx.writeValueWithoutResponse(new Uint8Array(pkt));
}

function handleRx(event) {
    const val = new Uint8Array(event.target.value.buffer);
    const hex = [...val].map(b => b.toString(16).padStart(2, '0')).join(' ').toUpperCase();
    log("<- RX: " + hex, "text-blue-400");

    // Rilevamento risposta SCAN (ID 1014 -> 0x14 0x03)
    // Nota: La documentazione indica che l'UID inizia dopo l'header del pacchetto di risposta
    if (val[0] === 0x11 && val[2] === 0x14 && val.length >= 10) {
        const uid = Array.from(val.slice(6, 10));
        const uidHex = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
        
        document.getElementById('uid-display').innerText = uidHex;
        const key = getMicroelKey(uid);
        document.getElementById('key-display').innerText = key.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
        log("TAG RILEVATO: " + uidHex, "text-green-400 font-bold");
    }
}

async function startReading() {
    // 1. Imposta Modalità Reader (1000)
    await sendCommand(1000, [0x01]); 
    await new Promise(r => setTimeout(r, 150));
    
    // 2. Scan HF ISO14443A (1014)
    // Parametro 0x01 attiva il polling continuo
    await sendCommand(1014, [0x01]);
    log("Scanning... Avvicina tessera", "text-blue-300 animate-pulse");
}

document.getElementById('btn-connect').onclick = connect;
document.getElementById('btn-read').onclick = startReading;
</script>
</body>
</html>
