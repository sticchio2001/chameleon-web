<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Chameleon Fix - Livello Fisico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-mono p-4">
    <div class="max-w-md mx-auto border border-slate-800 rounded-xl p-6 bg-slate-900 shadow-2xl">
        <h1 class="text-blue-500 font-black text-center mb-6 italic underline">FORCE NFC START</h1>

        <div class="space-y-4">
            <button id="btn-conn" class="w-full bg-slate-800 p-4 rounded-lg font-bold border border-slate-700">
                1. CONNETTI CHAMELEON
            </button>
            
            <button onclick="forceScan()" class="w-full bg-red-600 p-5 rounded-lg font-black text-lg shadow-xl animate-pulse">
                2. ATTIVA LED BIANCO
            </button>
        </div>

        <div id="log" class="mt-6 bg-black h-64 overflow-y-auto p-4 text-[10px] text-green-500 border border-slate-800 rounded">
            Attesa connessione...
        </div>

        <div class="mt-4 p-4 bg-blue-900/20 border border-blue-800 rounded-lg">
            <div class="text-[10px] text-blue-400">UID RILEVATO:</div>
            <div id="uid-out" class="text-xl font-black tracking-widest text-white">-- -- -- --</div>
        </div>
    </div>

    <script>
        const UART_SVC = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHR = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_CHR = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let tx;

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function connect() {
            try {
                const dev = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [UART_SVC]
                });
                const server = await dev.gatt.connect();
                const svc = await server.getPrimaryService(UART_SVC);
                tx = await svc.getCharacteristic(TX_CHR);
                const rx = await svc.getCharacteristic(RX_CHR);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const b = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(b).map(x => x.toString(16).padStart(2,'0')).join('').toUpperCase();
                    addLog("RX: " + hex);
                    
                    // Se riceve risposta scan (CMD 1014)
                    if (hex.includes("11EF1410")) {
                        const uid = hex.substring(12, 20);
                        document.getElementById('uid-out').innerText = uid.match(/.{1,2}/g).join(' ');
                        addLog("!!! TAG TROVATO !!!");
                    }
                };
                addLog("CONNESSO.");
                document.getElementById('btn-conn').innerText = "DISPOSITIVO PRONTO";
            } catch (err) { addLog("ERR: " + err.message); }
        }

        async function sendRaw(hex) {
            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(h => parseInt(h, 16)));
            // Invio forzato "Write Without Response" per evitare blocchi di Windows
            await tx.writeValueWithoutResponse(bytes);
            addLog("TX: " + hex);
        }

        async function forceScan() {
            if(!tx) return;
            addLog("INIZIO SEQUENZA CRITICA...");

            try {
                // 1. DUMP/RESET: Pulisce il buffer del Chameleon
                await tx.writeValueWithoutResponse(new Uint8Array([0x00, 0x00, 0x00, 0x00]));
                await new Promise(r => setTimeout(r, 100));

                // 2. SET READER MODE (CMD 1000 - Pacchetto completo con LRC)
                await sendRaw("11EFE803010001F5");
                await new Promise(r => setTimeout(r, 200));

                // 3. ANTENNA ON (CMD 1008 - Pacchetto completo con LRC)
                await sendRaw("11EFF003010001ED");
                await new Promise(r => setTimeout(r, 200));

                // 4. SCAN ISO14443A (CMD 1014 - Pacchetto completo con LRC)
                // Questo comando DEVE accendere il LED
                await sendRaw("11EFF603010001E7");
                addLog("COMANDO SCAN INVIATO.");

            } catch (e) { addLog("ERR: " + e.message); }
        }

        document.getElementById('btn-conn').onclick = connect;
    </script>
</body>
</html>
