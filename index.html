<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chameleon Ultra - Force Read v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-blue-500 font-bold border-b border-blue-900 pb-2 mb-4">MIFARE READER CORE</h1>
        
        <div class="bg-gray-900 p-4 rounded-lg mb-4">
            <button id="btn-conn" class="w-full bg-blue-700 p-3 rounded mb-4 font-bold">1. COLLEGA BLUETOOTH</button>
            <button onclick="runHardScan()" class="w-full bg-red-600 p-4 rounded font-black text-lg shadow-lg active:bg-red-800">
                2. SCANSIONE (LED BIANCO)
            </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-gray-900 p-3 rounded">
                <span class="text-xs text-gray-500 block uppercase">UID</span>
                <div id="out-uid" class="text-blue-400 font-bold">-- -- -- --</div>
            </div>
            <div class="bg-gray-900 p-3 rounded">
                <span class="text-xs text-gray-500 block uppercase">Chiave A</span>
                <div id="out-key" class="text-orange-400 font-bold">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="log" class="bg-black border border-gray-800 h-64 overflow-y-auto p-2 text-[10px] text-gray-400">
            <div>Attesa connessione...</div>
        </div>
    </div>

    <script>
        const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar;

        function addLog(m, c="text-gray-500") {
            const l = document.getElementById('log');
            l.innerHTML += `<div class="${c}">> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // Funzione calcolo LRC (XOR di tutti i byte)
        function getLRC(arr) {
            return arr.reduce((acc, b) => acc ^ b, 0);
        }

        async function connect() {
            try {
                const dev = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE]
                });
                const server = await dev.gatt.connect();
                const svc = await server.getPrimaryService(SERVICE);
                txChar = await svc.getCharacteristic(TX);
                const rx = await svc.getCharacteristic(RX);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const bytes = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                    addLog("RX: " + hex, "text-green-500");
                    
                    // Risposta allo scan (11 EF 14 10 ...) - L'UID di solito inizia al byte 6
                    if (bytes[0] === 0x11 && bytes[2] === 0x14 && bytes.length > 10) {
                        const uid = Array.from(bytes.slice(6, 10));
                        document.getElementById('out-uid').innerText = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                        // Calcolo chiave Microel
                        const kA = derive(uid);
                        document.getElementById('out-key').innerText = kA.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                    }
                };

                addLog("CONNESSO", "text-blue-400 font-bold");
                document.getElementById('btn-conn').innerText = "DISPOSITIVO PRONTO";
            } catch (err) { addLog("ERRORE: " + err.message, "text-red-500"); }
        }

        function derive(uid) {
            let s = uid.reduce((a, b) => a + b, 0) & 0xFF;
            let b7 = (s >> 4) & 0x0F; let b8 = s & 0x0F;
            let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||s==63||s==127||s==191||s==255);
            let k = cond ? (s + 1) : (s + 65);
            return [k, k^147, k^166, k^116, k^42, k^248];
        }

        async function sendCmd(cmd, data = []) {
            // Struttura pacchetto: 11 EF | CMD_L CMD_H | LEN_L LEN_H | DATA | LRC
            let p = [0x11, 0xEF, cmd & 0xFF, (cmd >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF, ...data];
            p.push(getLRC(p));
            await txChar.writeValue(new Uint8Array(p));
        }

        async function runHardScan() {
            if(!txChar) return alert("Connetti prima!");
            
            try {
                addLog("RESET ANTENNA...", "text-yellow-600");
                // 1. Forza Antenna OFF
                await sendCmd(1008, [0x00]);
                await new Promise(r => setTimeout(r, 100));

                // 2. Imposta Modalità Reader (Importante!)
                await sendCmd(1000, [0x01]);
                await new Promise(r => setTimeout(r, 100));

                // 3. Forza Antenna ON
                await sendCmd(1008, [0x01]);
                await new Promise(r => setTimeout(r, 100));

                addLog("INVIO SCAN 14443A (LED BIANCO)", "text-white");
                // 4. Esegui Scan
                await sendCmd(1014, [0x01]);
            } catch (e) { addLog("FALLITO: " + e.message, "text-red-500"); }
        }

        document.getElementById('btn-conn').onclick = connect;
    </script>
</body>
</html>
