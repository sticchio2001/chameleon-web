<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Microel Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; }
        .terminal { background: #000; height: 200px; overflow-y: auto; font-size: 0.7rem; border: 1px solid #30363d; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <h2 class="text-xl font-bold text-center text-blue-400 mb-4 italic">CHAMELEON MICROEL PRO</h2>

        <div class="box mb-4 flex justify-between items-center">
            <div>
                <div id="status" class="text-red-500 font-bold uppercase text-xs">Disconnesso</div>
                <div id="uid-display" class="text-blue-400 text-sm font-bold">UID: -- -- -- --</div>
            </div>
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold text-white text-sm">CONNETTI</button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="box"><label class="block text-[10px] text-gray-500 uppercase">Credito</label><span id="d-cred" class="text-lg text-green-400">-- €</span></div>
            <div class="box"><label class="block text-[10px] text-gray-500 uppercase">Operazioni</label><span id="d-op" class="text-lg">--</span></div>
            <div class="box"><label class="block text-[10px] text-gray-500 uppercase">Somma Ingr.</label><span id="d-tot" class="text-lg">-- €</span></div>
            <div class="box"><label class="block text-[10px] text-gray-500 uppercase">Data/Ora</label><span id="d-date" class="text-xs text-blue-300">--</span></div>
        </div>

        <div class="box mb-4">
            <label class="block text-[10px] text-gray-500 uppercase mb-2 italic">Ricarica Microel</label>
            <div class="flex gap-2">
                <select id="amountSel" class="bg-black border border-gray-700 rounded px-2 text-sm flex-1">
                    <option value="100">1.00 €</option>
                    <option value="500">5.00 €</option>
                    <option value="1000" selected>10.00 €</option>
                </select>
                <button onclick="startAnalyze()" class="bg-gray-700 px-4 py-2 rounded font-bold text-xs">ANALISI</button>
                <button onclick="startReload()" class="bg-purple-600 px-4 py-2 rounded font-bold text-xs">RICARICA</button>
            </div>
        </div>

        <div id="terminal" class="terminal p-2 rounded"></div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar, rxChar, currentUID = null;

        // --- Logica Core Microel (Trasportata da .ino) ---
        
        function decode16(low, high) { return (high << 8) | low; } [cite: 2]

        function deriveKeys(uid) { [cite: 14]
            let sommaUID = uid.reduce((a, b) => a + b, 0);
            let b6_v = sommaUID & 0xFF;
            let b7_k = (b6_v >> 4) & 0x0F;
            let b8_k = b6_v & 0x0F;
            let cond = (b7_k==0x0 || (b7_k==0x1 && b8_k!=0xF) || b7_k==0x4 || (b7_k==0x5 && b8_k!=0xF) || b7_k==0x8 || (b7_k==0x9 && b8_k!=0xF) || b7_k==0xC || (b7_k==0xD && b8_k!=0xF) || b6_v==0x3F || b6_v==0x7F || b6_v==0xBF || b6_v==0xFF);
            let kByte = cond ? (b6_v + 1) : (b6_v + 0x41); [cite: 15]
            let kA = [kByte, kByte ^ 0x93, kByte ^ 0xA6, kByte ^ 0x74, kByte ^ 0x2A, kByte ^ 0xF8];
            let kB = kA.map(b => (~b) & 0xFF);
            return { kA, kB };
        }

        function calculateChecksum(block) { [cite: 41]
            let cs = 0;
            for(let i=0; i<15; i++) cs += block[i];
            return (cs + 0x21) & 0xFF;
        }

        // --- Gestione Chameleon Bluetooth ---

        async function sendCommand(cmdId, data = []) {
            let frame = [0x11, 0xEF, cmdId & 0xFF, (cmdId >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF, ...data];
            let lrc = 0;
            frame.forEach(b => lrc ^= b);
            frame.push(lrc);
            await txChar.writeValue(new Uint8Array(frame));
        }

        document.getElementById('btn-connect').onclick = async () => {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Chameleon' }],
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            txChar = await service.getCharacteristic(TX_UUID);
            rxChar = await service.getCharacteristic(RX_UUID);
            
            await rxChar.startNotifications();
            rxChar.oncharacteristicvaluechanged = handleNotification;
            
            document.getElementById('status').innerText = "ONLINE";
            document.getElementById('status').className = "text-green-500 font-bold uppercase text-xs";
        };

        function handleNotification(event) {
            let raw = new Uint8Array(event.target.value.buffer);
            // Qui implementeresti il parser delle risposte per estrarre l'UID e i Blocchi
            console.log("RX:", raw);
        }

        async function startAnalyze() {
            // 1. Leggi UID
            // 2. Calcola Chiavi
            // 3. Autentica e leggi blocco 4
            // 4. Esegui parsing Microel (trasportato da source: 21-23)
            log("Analisi avviata...");
        }

        function log(msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `<div>> ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
