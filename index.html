<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Pro - Chameleon Desktop v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', monospace; }
        .terminal { background: #000; border: 1px solid #30363d; height: 180px; overflow-y: auto; font-size: 11px; color: #8b949e; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6 text-blue-500 italic font-bold text-2xl">
            MICROEL <span class="text-white font-light">ULTRA SCAN</span>
            <div class="flex gap-2">
                <button id="btn-connect" class="bg-blue-600 text-sm hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition-all">CONNETTI</button>
                <button id="btn-scan" class="bg-red-600 text-sm hover:bg-red-500 text-white px-4 py-2 rounded font-bold transition-all disabled:opacity-20" disabled>ATTIVA LED SCAN</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="box p-4 border border-blue-900">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">UID</div>
                <div id="uid-display" class="text-xl font-mono text-white tracking-widest">-- -- -- --</div>
            </div>
            <div class="box p-4 border border-orange-900">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Microel Key A</div>
                <div id="key-display" class="text-xl font-mono text-orange-400">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="terminal" class="terminal p-4 rounded-lg">
            <div class="text-yellow-600 italic text-[9px] mb-2">System Log</div>
        </div>
    </div>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let tx = null;

function log(msg, color = "text-slate-400") {
    const term = document.getElementById('terminal');
    term.innerHTML += `<div class="${color}">> ${msg}</div>`;
    term.scrollTop = term.scrollHeight;
}

// Calcolo LRC (Checksum) corretto secondo specifica Chameleon
function calcLRC(pkt) {
    return pkt.reduce((acc, b) => acc ^ b, 0);
}

// Funzione Microel Key A
function getMicroelKey(uid) {
    let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
    let b7 = (sum >> 4) & 0x0F, b8 = sum & 0x0F;
    let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||sum==63||sum==127||sum==191||sum==255);
    let k = cond ? (sum + 1) : (sum + 65);
    return [k, k^147, k^166, k^116, k^42, k^248];
}

async function connect() {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'Chameleon' }],
            optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        tx = await service.getCharacteristic(TX_UUID);
        const rx = await service.getCharacteristic(RX_UUID);
        await rx.startNotifications();
        rx.oncharacteristicvaluechanged = handleRx;
        
        log("CONNESSO AL DISPOSITIVO", "text-green-500 font-bold");
        document.getElementById('btn-scan').disabled = false;
    } catch (e) { log("ERRORE: " + e.message, "text-red-500"); }
}

async function sendFrame(cmd, data = []) {
    // Struttura: Header (11 EF) + CMD (2b) + LEN (2b) + DATA + LRC
    let pkt = [0x11, 0xEF, cmd & 0xFF, (cmd >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF, ...data];
    pkt.push(calcLRC(pkt));
    await tx.writeValueWithoutResponse(new Uint8Array(pkt));
    log(`TX CMD ${cmd}`, "text-purple-400");
}

async function forceScan() {
    try {
        log("SVEGLIA CHIP RADIO...", "text-yellow-500");
        // 1. SET_READER_MODE (1000)
        await sendFrame(1000, [0x01]);
        await new Promise(r => setTimeout(r, 100));

        // 2. ANTENNA_POWER_ON (1008) - Questo è CRUCIALE per il LED
        await sendFrame(1008, [0x01]);
        await new Promise(r => setTimeout(r, 100));

        // 3. HF_14443A_SCAN (1014)
        log("LED BIANCO ATTIVO - AVVICINA TAG", "text-blue-400 font-bold");
        await sendFrame(1014, [0x01]);
    } catch (e) { log("ERRORE INVIO: " + e.message, "text-red-400"); }
}

function handleRx(event) {
    const val = new Uint8Array(event.target.value.buffer);
    const hex = [...val].map(b => b.toString(16).padStart(2, '0')).join(' ').toUpperCase();
    
    // Risposta a SCAN (1014)
    if (val[0] === 0x11 && val[2] === 0x14 && val.length > 8) {
        const uid = Array.from(val.slice(6, 10));
        const uidHex = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
        document.getElementById('uid-display').innerText = uidHex;
        
        const key = getMicroelKey(uid);
        document.getElementById('key-display').innerText = key.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
        log("TAG LETTO: " + uidHex, "text-green-400 font-bold");
    }
}

document.getElementById('btn-connect').onclick = connect;
document.getElementById('btn-scan').onclick = forceScan;
</script>
</body>
</html>
