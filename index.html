<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Chameleon - ULTIMATE FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        .log-box { background: #050505; border: 1px solid #1a1a1a; height: 350px; overflow-y: auto; padding: 10px; font-size: 12px; }
        .status-on { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .status-off { color: #ff0000; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-4 italic">CHAMELEON_ULTRA_DEBUG_v4</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <button id="btnConnect" class="bg-zinc-800 p-4 border border-zinc-700 hover:bg-zinc-700 font-bold uppercase">1. Connetti BLE</button>
            <button onclick="hardResetAndScan()" class="bg-red-900 p-4 border border-red-700 hover:bg-red-600 font-black uppercase text-white">2. FORZA SCAN (LED)</button>
        </div>

        <div class="bg-zinc-900 p-4 border border-zinc-800 mb-4 grid grid-cols-2 gap-4">
            <div>
                <span class="text-[10px] text-zinc-500 block">UID DETECTED</span>
                <div id="uidVal" class="text-xl font-bold">-- -- -- --</div>
            </div>
            <div>
                <span class="text-[10px] text-zinc-500 block">CALCULATED KEY A</span>
                <div id="keyVal" class="text-xl font-bold text-orange-500">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="console" class="log-box mb-2"></div>
        <button onclick="document.getElementById('console').innerHTML=''" class="text-[10px] text-zinc-600 underline uppercase">Clear Log</button>
    </div>

    <script>
        const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar, device;

        function log(m, type = '') {
            const c = document.getElementById('console');
            const color = type === 'in' ? 'text-blue-400' : (type === 'out' ? 'text-yellow-400' : 'text-zinc-500');
            c.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString().split(' ')[0]}] ${m}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function connect() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE]
                });
                const server = await device.gatt.connect();
                const svc = await server.getPrimaryService(SERVICE);
                txChar = await svc.getCharacteristic(TX);
                const rx = await svc.getCharacteristic(RX);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const val = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(val).map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                    log(`<- RX: ${hex}`, 'in');
                    
                    // Se troviamo l'UID nella risposta (comando 1014)
                    if (val[0] === 0x11 && val[2] === 0x14 && val.length > 8) {
                        const uid = Array.from(val.slice(6, 10));
                        document.getElementById('uidVal').innerText = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                        const key = deriveKey(uid);
                        document.getElementById('keyVal').innerText = key.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                        log("!!! TESSERA RILEVATA !!!", "in");
                    }
                };
                log("CHAMELEON CONNESSO", "in");
                document.getElementById('btnConnect').innerText = "CONNESSO";
            } catch (err) { log("ERRORE: " + err.message); }
        }

        function deriveKey(uid) {
            let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
            let b7 = (sum >> 4) & 0x0F; let b8 = sum & 0x0F;
            let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||sum==63||sum==127||sum==191||sum==255);
            let k = cond ? (sum + 1) : (sum + 65);
            return [k, k^147, k^166, k^116, k^42, k^248];
        }

        async function sendRaw(cmd, data = []) {
            // Header Chameleon ufficiale
            let head = [0x11, 0xEF, cmd & 0xFF, (cmd >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF];
            let full = [...head, ...data];
            let lrc = 0; full.forEach(b => lrc ^= b);
            full.push(lrc);
            
            await txChar.writeValue(new Uint8Array(full));
            log(`-> TX CMD ${cmd} [${full.map(b => b.toString(16).padStart(2,'0')).join(' ')}]`, 'out');
        }

        async function hardResetAndScan() {
            if(!txChar) return alert("Connetti Bluetooth!");
            
            log("INIZIO RESET HARDWARE...");
            try {
                // 1. SVEGLIA: Invia byte vuoti per pulire la seriale
                await txChar.writeValue(new Uint8Array([0x00, 0x00, 0x00]));
                await new Promise(r => setTimeout(r, 100));

                // 2. MODALITA' READER (CMD 1000)
                await sendRaw(1000, [0x01]);
                await new Promise(r => setTimeout(r, 200));

                // 3. ANTENNA POWER (CMD 1008)
                await sendRaw(1008, [0x01]);
                await new Promise(r => setTimeout(r, 200));

                // 4. HF SCAN (CMD 1014)
                log("TENTATIVO ACCENSIONE LED BIANCO...", "out");
                await sendRaw(1014, [0x01]);
            } catch (e) { log("ERRORE: " + e.message); }
        }

        document.getElementById('btnConnect').onclick = connect;
    </script>
</body>
</html>
