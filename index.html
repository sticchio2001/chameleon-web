<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chameleon Ultra - CLI MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-400 font-mono p-4">
    <div class="max-w-md mx-auto border border-green-900 p-6 shadow-[0_0_20px_rgba(0,255,0,0.2)]">
        <h1 class="text-center text-xl font-bold mb-6 border-b border-green-900 pb-2">CLI TERMINAL MODE</h1>

        <button id="btn-conn" class="w-full bg-green-900 text-white p-4 rounded mb-4 font-bold border border-green-400">
            1. COLLEGA DISPOSITIVO
        </button>
        
        <button onclick="sendCLI()" class="w-full bg-blue-900 text-white p-4 rounded font-black mb-6 border border-blue-400">
            2. AVVIA LETTURA (LED BIANCO)
        </button>

        <div id="log" class="bg-black h-64 overflow-y-auto p-2 text-xs border border-green-900 mb-4">
            In attesa di connessione BLE...
        </div>

        <div class="bg-zinc-900 p-4 rounded">
            <span class="text-[10px] text-zinc-500 uppercase">UID Rilevato:</span>
            <div id="uid-res" class="text-white text-lg font-bold">-- -- -- --</div>
        </div>
    </div>

    <script>
        const SVC = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar;
        let decoder = new TextDecoder();

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function connect() {
            try {
                const dev = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SVC]
                });
                const server = await dev.gatt.connect();
                const svc = await server.getPrimaryService(SVC);
                txChar = await svc.getCharacteristic(TX);
                const rx = await svc.getCharacteristic(RX);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    let msg = decoder.decode(e.target.value);
                    log("RX: " + msg.trim());
                    
                    // Se nella risposta testuale appare un UID
                    if (msg.includes("UID:")) {
                        let match = msg.match(/UID:\s*([0-9A-Fa-f\s]+)/);
                        if(match) document.getElementById('uid-res').innerText = match[1].trim();
                    }
                };
                log("CONNESSO IN MODALITÀ TESTUALE.");
            } catch (err) { log("ERRORE: " + err.message); }
        }

        async function sendCLI() {
            if (!txChar) return;
            
            log("INVIO COMANDI CLI...");
            try {
                // Invia i comandi testuali seguiti da a capo (\r\n)
                // hf mf cscan è il comando ufficiale per lo scan Mifare
                const commands = [
                    "hf mf cscan\r\n"
                ];

                for (let cmd of commands) {
                    let encoder = new TextEncoder();
                    await txChar.writeValue(encoder.encode(cmd));
                    log("TX: " + cmd.trim());
                    await new Promise(r => setTimeout(r, 500));
                }
            } catch (e) { log("ERRORE TX: " + e.message); }
        }

        document.getElementById('btn-conn').onclick = connect;
    </script>
</body>
</html>
