<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BLE WebApp</title>
</head>
<body>
  <h1>Connessione Bluetooth</h1>
  <button id="connectBtn">Connetti</button>
  <pre id="log"></pre>

<script>
let device;
let characteristic;

const SERVICE_UUID = '0000xxxx-0000-1000-8000-00805f9b34fb'; // UUID del servizio
const CHARACTERISTIC_UUID = '0000yyyy-0000-1000-8000-00805f9b34fb'; // UUID della characteristic

document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    log("Connesso al dispositivo");

    characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', handleNotification);

  } catch (error) {
    log("Errore: " + error);
  }
});

function handleNotification(event) {
  const value = new TextDecoder().decode(event.target.value);
  log("Ricevuto: " + value);
}

async function sendCommand(cmd) {
  const encoder = new TextEncoder();
  await characteristic.writeValue(encoder.encode(cmd));
}

function log(msg) {
  document.getElementById('log').textContent += msg + "\n";
}
</script>
</body>
</html>
