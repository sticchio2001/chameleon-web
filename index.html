<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Ultra - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 p-5 font-mono text-sm">

    <div class="max-w-md mx-auto">
        <h1 class="text-orange-500 font-bold mb-4 border-b border-orange-900 pb-2">CHAMELEON DEBUG V2</h1>

        <div class="flex flex-col gap-3 mb-6">
            <button id="conn-btn" class="bg-slate-800 p-4 rounded border border-slate-700 font-bold active:bg-slate-700">1. COLLEGA BLUETOOTH</button>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="sendRaw('11ef03ea0000f4')" class="bg-blue-900/30 p-3 rounded border border-blue-800 text-blue-400 text-xs">TEST BATTERIA</button>
                <button onclick="sendRaw('11ef03e80000f6')" class="bg-blue-900/30 p-3 rounded border border-blue-800 text-blue-400 text-xs">TEST VERSIONE</button>
            </div>

            <button onclick="startCoges()" class="bg-orange-600 p-4 rounded font-black text-white shadow-lg shadow-orange-900/20 active:scale-95 transition-transform">
                🔍 SCAN COGES (14443B)
            </button>
        </div>

        <div id="terminal" class="bg-slate-900 border border-slate-800 h-64 overflow-y-auto p-3 text-[10px] rounded mb-2">
            <div class="text-slate-600 italic tracking-widest mb-2 border-b border-slate-800">Console Logs</div>
        </div>
        
        <button onclick="document.getElementById('terminal').innerHTML=''" class="text-[9px] text-slate-600 underline uppercase">Reset Log</button>
    </div>

    <script>
        const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let gatt, tx, rx;

        function log(msg, color = "text-slate-500") {
            const t = document.getElementById('terminal');
            t.innerHTML += `<div class="${color} mb-1"> ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        async function connect() {
            try {
                log("Cercando...", "text-yellow-500");
                const dev = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE]
                });
                
                log("Connessione GATT...");
                gatt = await dev.gatt.connect();
                const svc = await gatt.getPrimaryService(SERVICE);
                tx = await svc.getCharacteristic(TX_UUID);
                rx = await svc.getCharacteristic(RX_UUID);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const bytes = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ');
                    log(`<- RECV: ${hex.toUpperCase()}`, "text-green-400 font-bold");
                };

                log("PRONTO!", "text-green-500 font-bold");
                document.getElementById('conn-btn').innerText = "CONNESSO";
            } catch (err) {
                log("ERRORE: " + err.message, "text-red-500");
            }
        }

        async function sendRaw(hex) {
            if (!tx) return log("NON CONNESSO!", "text-red-500");
            try {
                const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
                // Alcuni dispositivi preferiscono writeValueWithResponse
                await tx.writeValue(bytes);
                log(`-> SEND: ${hex.toUpperCase()}`, "text-blue-400");
            } catch (e) {
                log("ERRORE INVIO: " + e.message, "text-red-500");
            }
        }

        async function startCoges() {
            log("AVVIO SEQUENZA COGES...", "text-orange-500 font-bold");
            // 1. Forza Antenna ON (CMD 1008)
            await sendRaw('11ef03f0010001f4');
            await new Promise(r => setTimeout(r, 150));
            // 2. Scan B (CMD 1014 con param 02)
            await sendRaw('11ef03f6010002f3');
        }

        document.getElementById('conn-btn').onclick = connect;
    </script>
</body>
</html>
