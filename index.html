<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Pro - FIX DEFINITIVO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] font-mono p-4">
    <div class="max-w-xl mx-auto border border-slate-700 p-6 rounded-lg bg-black">
        <h1 class="text-blue-500 font-black mb-4">CHAMELEON ULTRA > PROTOCOL FIX</h1>
        
        <div class="flex gap-2 mb-6">
            <button id="btnConnect" class="bg-blue-600 px-4 py-2 rounded font-bold text-white hover:bg-blue-500">1. CONNETTI</button>
            <button id="btnScan" class="bg-red-600 px-4 py-2 rounded font-bold text-white hover:bg-red-500" disabled>2. SCAN (LED BIANCO)</button>
        </div>

        <div class="space-y-4">
            <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                <div class="text-xs text-zinc-500 uppercase">UID TESSERA</div>
                <div id="uid-val" class="text-2xl font-bold text-white">-- -- -- --</div>
            </div>
            <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                <div class="text-xs text-zinc-500 uppercase">MICROEL KEY A</div>
                <div id="key-val" class="text-2xl font-bold text-orange-500">-- -- -- -- -- --</div>
            </div>
        </div>

        <div id="log" class="mt-6 h-40 overflow-y-auto text-[10px] text-zinc-400 bg-zinc-950 p-2 border border-zinc-800">
            Console pronta.
        </div>
    </div>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let tx, rx, device;

function log(m) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${m}</div>`;
    l.scrollTop = l.scrollHeight;
}

// Formula Microel Key A (Tua originale)
function getMicroelKey(uid) {
    let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
    let b7 = (sum >> 4) & 0x0F, b8 = sum & 0x0F;
    let cond = (b7==0||(b7==1&&b8!=15)||b7==4||(b7==5&&b8!=15)||b7==8||(b7==9&&b8!=15)||b7==12||(b7==13&&b8!=15)||sum==63||sum==127||sum==191||sum==255);
    let k = cond ? (sum + 1) : (sum + 65);
    return [k, k^147, k^166, k^116, k^42, k^248];
}

async function connect() {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'Chameleon' }],
            optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        tx = await service.getCharacteristic(TX_UUID);
        rx = await service.getCharacteristic(RX_UUID);
        
        await rx.startNotifications();
        rx.oncharacteristicvaluechanged = (e) => {
            const val = new Uint8Array(e.target.value.buffer);
            // Se è una risposta di SCAN (1014) e contiene dati (> 6 byte header)
            if (val[0] === 0x11 && val[2] === 0x14 && val.length > 6) {
                const uid = Array.from(val.slice(6, 10));
                const uidHex = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                document.getElementById('uid-val').innerText = uidHex;
                
                const key = getMicroelKey(uid);
                document.getElementById('key-val').innerText = key.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                log("TAG RILEVATO: " + uidHex);
            }
        };

        log("CONNESSO.");
        document.getElementById('btnScan').disabled = false;
    } catch (e) { log("ERR: " + e.message); }
}

async function sendRaw(cmdId, data = []) {
    // Protocollo binario Chameleon: 0x11 0xEF | CMD(2) | LEN(2) | DATA | LRC
    const head = new Uint8Array([0x11, 0xEF, cmdId & 0xFF, (cmdId >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF]);
    const pkt = new Uint8Array(head.length + data.length + 1);
    pkt.set(head);
    pkt.set(data, head.length);
    
    // LRC: XOR di tutti i byte
    let lrc = 0;
    for (let i = 0; i < pkt.length - 1; i++) lrc ^= pkt[i];
    pkt[pkt.length - 1] = lrc;

    await tx.writeValueWithoutResponse(pkt);
}

async function doScan() {
    log("Inizializzazione... (LED Bianco dovrebbe accendersi)");
    try {
        // Sequenza esatta dal link taichunmin:
        // 1. SET_READER_MODE (1000) attivo
        await sendRaw(1000, [0x01]);
        await new Promise(r => setTimeout(r, 50));
        
        // 2. HF_14443A_SCAN (1014) con parametro 0x01 (Single/Continuous Poll)
        // Questo comando abilita il chip radio PN7160
        await sendRaw(1014, [0x01]);
        
        log("Antenna Attiva. Avvicina Tag.");
    } catch (e) { log("ERR SCAN: " + e.message); }
}

document.getElementById('btnConnect').onclick = connect;
document.getElementById('btnScan').onclick = doScan;
</script>
</body>
</html>
