<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Analyzer - Chameleon Ultra Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; }
        .terminal { background: #000; border: 1px solid #30363d; height: 250px; overflow-y: auto; font-size: 11px; color: #8b949e; padding: 10px; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-black text-blue-500 italic">MICROEL <span class="text-white font-light">PRO</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Chameleon Ultra NFC Interface</p>
        </header>

        <div class="box p-6 mb-6 flex justify-between items-center border-l-4 border-blue-600">
            <div>
                <div id="status-text" class="text-red-500 font-bold text-xs uppercase">Stato: Disconnesso</div>
                <div id="uid-display" class="text-blue-400 text-lg font-bold mt-1 tracking-widest">UID: -- -- -- --</div>
            </div>
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95">
                CONNETTI
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="box p-3 text-center"><label class="block text-[9px] text-slate-500 uppercase">Credito</label><span id="d-cred" class="text-xl font-bold text-green-400">-- €</span></div>
            <div class="box p-3 text-center"><label class="block text-[9px] text-slate-500 uppercase">Operazioni</label><span id="d-op" class="text-xl font-bold text-orange-400">--</span></div>
            <div class="box p-3 text-center"><label class="block text-[9px] text-slate-500 uppercase">Tot. Ingr.</label><span id="d-tot" class="text-xl font-bold">-- €</span></div>
            <div class="box p-3 text-center"><label class="block text-[9px] text-slate-500 uppercase">Key A</label><span id="d-key" class="text-[9px] text-blue-300 font-bold block mt-1">--</span></div>
        </div>

        <button onclick="startAnalyze()" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-xl font-bold mb-4 border border-slate-600 transition-all">
            🔍 AVVIA ANALISI (SCAN TAG)
        </button>

        <div id="terminal" class="terminal rounded-xl shadow-inner mb-4">
            <div class="text-slate-600 italic tracking-widest">Attesa comando...</div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar, rxChar, device;

        function log(msg, color = "text-slate-500") {
            const term = document.getElementById('terminal');
            term.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        // --- Logica Calcolo Chiavi Microel ---
        function deriveKeys(uid) {
            let sommaUID = uid.reduce((a, b) => a + b, 0);
            let b6_v = sommaUID & 0xFF;
            let b7_k = (b6_v >> 4) & 0x0F;
            let b8_k = b6_v & 0x0F;
            let cond = (b7_k==0x0 || (b7_k==0x1 && b8_k!=0xF) || b7_k==0x4 || (b7_k==0x5 && b8_k!=0xF) || b7_k==0x8 || (b7_k==0x9 && b8_k!=0xF) || b7_k==0xC || (b7_k==0xD && b8_k!=0xF) || b6_v==0x3F || b6_v==0x7F || b6_v==0xBF || b6_v==0xFF);
            let kByte = cond ? (b6_v + 1) : (b6_v + 0x41);
            let kA = [kByte, kByte ^ 0x93, kByte ^ 0xA6, kByte ^ 0x74, kByte ^ 0x2A, kByte ^ 0xF8];
            return kA;
        }

        async function sendRawHex(hex) {
            if (!txChar) return;
            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            await txChar.writeValue(bytes);
            log(`-> ${hex.toUpperCase()}`, "text-blue-900");
        }

        document.getElementById('btn-connect').onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txChar = await service.getCharacteristic(TX_UUID);
                rxChar = await service.getCharacteristic(RX_UUID);

                await rxChar.startNotifications();
                rxChar.oncharacteristicvaluechanged = handleRX;

                document.getElementById('status-text').innerText = "Stato: Connesso";
                document.getElementById('status-text').className = "text-green-500 font-bold text-xs";
                log("CHAMELEON PRONTO", "text-green-500 font-bold");
            } catch (err) {
                log("Errore: " + err.message, "text-red-500");
            }
        };

        function handleRX(event) {
            let val = new Uint8Array(event.target.value.buffer);
            let hex = Array.from(val).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
            log(`<- ${hex}`, "text-green-400");

            // Se è una risposta a un comando di SCAN (contiene l'UID)
            // Nel protocollo Ultra, la risposta 11 EF ... contiene i dati dell'UID dopo l'header
            if (hex.startsWith("11EF") && val.length > 10) {
                let uid = Array.from(val.slice(6, 10)); // Estraiamo 4 byte di UID
                let uidStr = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                document.getElementById('uid-display').innerText = `UID: ${uidStr}`;
                
                let keyA = deriveKeys(uid);
                document.getElementById('d-key').innerText = keyA.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                log(`UID RILEVATO: ${uidStr}`, "text-blue-400 font-bold");
            }
        }

        async function startAnalyze() {
            if(!txChar) return log("Connetti prima!", "text-red-500");
            
            log("Configurazione Reader...", "text-yellow-600");

            // Sequenza corretta per Chameleon Ultra:
            // 1. Imposta modalità Reader (CMD 1000, param 01)
            await sendRawHex('11efe803010001f5'); 
            await new Promise(r => setTimeout(r, 100));

            // 2. Accendi Antenna (CMD 1008, param 01)
            await sendRawHex('11eff003010001ed');
            await new Promise(r => setTimeout(r, 100));

            // 3. Esegui Scan Mifare (CMD 1014, param 01 per ISO14443A)
            // Questo DEVE accendere il LED bianco
            log("Scansione in corso (LED Bianco)...", "text-white font-bold");
            await sendRawHex('11eff603010001e7');
        }
    </script>
</body>
</html>
