<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mifare Classic 1K Reader - Chameleon Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 font-mono p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-blue-500 font-black text-xl mb-4">CHAMELEON ULTRA CORE</h1>
        
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
            <button id="btn-conn" class="w-full bg-blue-700 p-4 rounded-lg font-bold mb-4">1. COLLEGA BLUETOOTH</button>
            <button onclick="startReadProcess()" class="w-full bg-green-600 p-5 rounded-lg font-black text-lg shadow-2xl active:bg-green-800">
                2. LEGGI MIFARE CLASSIC 1K
            </button>
        </div>

        <div class="space-y-4">
            <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800">
                <p class="text-[10px] text-zinc-500 uppercase">UID Tessera</p>
                <div id="out-uid" class="text-blue-400 font-bold text-xl tracking-widest">-- -- -- --</div>
            </div>
            <div id="console" class="bg-black border border-zinc-800 h-64 overflow-y-auto p-2 text-[10px] text-green-600">
                Attesa comando...
            </div>
        </div>
    </div>

    <script>
        const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar;

        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${m}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE);
                txChar = await service.getCharacteristic(TX);
                const rx = await service.getCharacteristic(RX);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = (e) => {
                    const b = new Uint8Array(e.target.value.buffer);
                    const hex = Array.from(b).map(x => x.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                    log("RX: " + hex);
                    
                    // Se la risposta contiene l'UID (tipicamente dopo il comando 1014)
                    if (b.length >= 10 && b[0] === 0x11 && b[2] === 0x14) {
                        const uid = Array.from(b.slice(6, 10)).map(x => x.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                        document.getElementById('out-uid').innerText = uid;
                        log("SUCCESSO: UID RILEVATO " + uid);
                    }
                };
                log("CONNESSO AL DISPOSITIVO");
            } catch (err) { log("ERRORE: " + err); }
        }

        // Funzione per inviare pacchetti binari "puri" con LRC precalcolato
        async function sendRaw(hex) {
            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(h => parseInt(h, 16)));
            await txChar.writeValue(bytes);
            log("TX: " + hex.toUpperCase());
        }

        async function startReadProcess() {
            if (!txChar) return alert("Connetti Bluetooth!");

            log("INIZIO SEQUENZA DI LETTURA FORZATA...");

            try {
                // SEQUENZA DI "SVEGLIA" DEL CHAMELEON ULTRA (Firmware 2.0+)
                
                // 1. Applica impostazioni Reader (CMD 1000, Data 01, LRC f5)
                await sendRaw("11efe803010001f5");
                await new Promise(r => setTimeout(r, 200));

                // 2. Attiva Antenna (CMD 1008, Data 01, LRC ed)
                await sendRaw("11eff003010001ed");
                await new Promise(r => setTimeout(r, 200));

                // 3. Scan ISO14443A (CMD 1014, Data 01, LRC e7)
                // Questo comando DEVE far lampeggiare il LED bianco
                log("SCANSIONE ATTIVA - AVVICINA TESSERA...");
                await sendRaw("11eff603010001e7");
                
            } catch (e) { log("ERRORE INVIO: " + e); }
        }

        document.getElementById('btn-conn').onclick = connect;
    </script>
</body>
</html>
