<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Microel Pro - Chameleon Ultra Ufficiale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .console { background: #000; height: 300px; overflow-y: auto; border: 1px solid #1e293b; padding: 12px; font-size: 11px; color: #4ade80; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-black text-blue-500 mb-6 italic">MICROEL <span class="text-white">ULTRA-SCAN</span></h1>

        <div class="card mb-6 shadow-2xl">
            <div class="flex gap-4 mb-6">
                <button id="btnConnect" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 text-sm uppercase">
                    1. Connetti Bluetooth
                </button>
                <button onclick="startScan()" class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-xl font-black transition-all shadow-lg active:scale-95 text-sm uppercase">
                    2. Leggi Microel (LED)
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/50 p-4 rounded-lg border border-slate-800">
                    <span class="text-[10px] text-slate-500 block mb-1">UID TESSERA</span>
                    <div id="displayUid" class="text-blue-400 font-bold text-lg tracking-widest">-- -- -- --</div>
                </div>
                <div class="bg-black/50 p-4 rounded-lg border border-slate-800 text-center">
                    <span class="text-[10px] text-slate-500 block mb-1">KEY A (MICROEL)</span>
                    <div id="displayKey" class="text-orange-400 font-bold text-sm">-- -- -- -- -- --</div>
                </div>
            </div>
        </div>

        <div id="terminal" class="console rounded-xl shadow-inner border-t-2 border-blue-900">
            <div class="text-slate-600">> Sistema pronto. In attesa di comando ufficiale...</div>
        </div>
    </div>

    <script>
        const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let txChar;

        function log(msg, isErr = false) {
            const term = document.getElementById('terminal');
            const color = isErr ? 'text-red-500' : 'text-green-500';
            term.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        // Calcolo LRC ufficiale del software Chameleon
        function calculateLRC(data) {
            let lrc = 0;
            for (const byte of data) lrc ^= byte;
            return lrc;
        }

        // Funzione Microel presa dal tuo file .ino
        function deriveMicroelKey(uid) {
            let sum = uid.reduce((a, b) => a + b, 0) & 0xFF;
            let b7 = (sum >> 4) & 0x0F;
            let b8 = sum & 0x0F;
            let cond = (b7==0 || (b7==1 && b8!=15) || b7==4 || (b7==5 && b8!=15) || b7==8 || (b7==9 && b8!=15) || b7==12 || (b7==13 && b8!=15) || sum==63 || sum==127 || sum==191 || sum==255);
            let k = cond ? (sum + 1) : (sum + 65);
            return [k, k ^ 0x93, k ^ 0xA6, k ^ 0x74, k ^ 0x2A, k ^ 0xF8];
        }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [UART_SERVICE]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE);
                txChar = await service.getCharacteristic(TX_UUID);
                const rx = await service.getCharacteristic(RX_UUID);

                await rx.startNotifications();
                rx.oncharacteristicvaluechanged = handleData;

                log("CHAMELEON ULTRA CONNESSO");
                document.getElementById('btnConnect').innerText = "✅ ONLINE";
                document.getElementById('btnConnect').classList.replace('bg-blue-600', 'bg-emerald-700');
            } catch (e) { log("Errore: " + e.message, true); }
        }

        function handleData(event) {
            const val = new Uint8Array(event.target.value.buffer);
            // Protocollo ufficiale: Header 0x11 0xEF | CMD 1014 | UID...
            if (val[0] === 0x11 && val[2] === 0x14 && val.length > 8) {
                const uid = Array.from(val.slice(6, 10));
                const uidHex = uid.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                document.getElementById('displayUid').innerText = uidHex;
                
                const keyA = deriveMicroelKey(uid);
                document.getElementById('displayKey').innerText = keyA.map(b => b.toString(16).padStart(2,'0')).join(' ').toUpperCase();
                log("TESSERA RILEVATA: " + uidHex);
            }
        }

        async function sendCommand(cmd, data = []) {
            // Header Chameleon: 11 EF | CMD_L CMD_H | LEN_L LEN_H
            let header = [0x11, 0xEF, cmd & 0xFF, (cmd >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF];
            let packet = [...header, ...data];
            packet.push(calculateLRC(packet));
            
            await txChar.writeValue(new Uint8Array(packet));
            log(`TX CMD ${cmd}: ${data.length} byte dati inviati`);
        }

        async function startScan() {
            if (!txChar) return alert("Connetti Bluetooth prima!");
            
            try {
                log("INIZIO SEQUENZA UFFICIALE (NFC-V)...");
                // 1. Forza Reader Mode (CMD 1000)
                await sendCommand(1000, [0x01]);
                await new Promise(r => setTimeout(r, 150));
                
                // 2. Forza Antenna ON (CMD 1008)
                await sendCommand(1008, [0x01]);
                await new Promise(r => setTimeout(r, 150));
                
                // 3. Esegui Scan ISO14443A (CMD 1014)
                // Questo comando accende il LED bianco sul dispositivo
                await sendCommand(1014, [0x01]);
                log("SCANSIONE ATTIVA (Cerca tessera...)");
            } catch (e) { log("Errore Scan: " + e.message, true); }
        }

        document.getElementById('btnConnect').onclick = connect;
    </script>
</body>
</html>
