<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Ultra Web Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .terminal { background: #000; border: 1px solid #334155; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-blue-400">Chameleon Ultra JS</h1>
            <p class="text-sm text-slate-400">Web Bluetooth Interface</p>
        </header>

        <div class="bg-slate-800 rounded-xl p-4 shadow-lg mb-4 border border-slate-700">
            <div class="flex items-center justify-between mb-4">
                <span id="status-dot" class="h-3 w-3 rounded-full bg-red-500"></span>
                <span id="status-text" class="text-sm font-medium">Disconnesso</span>
                <button id="connect-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition">
                    Connetti
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="sendCommand('01')" class="bg-slate-700 p-3 rounded-lg hover:bg-slate-600 text-sm italic">Get Version</button>
            <button onclick="sendCommand('02')" class="bg-slate-700 p-3 rounded-lg hover:bg-slate-600 text-sm italic">Battery Level</button>
        </div>

        <div class="terminal rounded-lg p-3 mb-4" id="terminal">
            <div class="text-blue-300 font-bold border-b border-slate-800 mb-1">--- Terminal Log ---</div>
        </div>

        <button onclick="clearLog()" class="text-xs text-slate-500 underline w-full text-right">Cancella Log</button>
    </div>

    <script>
        // UUID Standard per Nordic UART Service (utilizzato dal Chameleon)
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // Scrittura
        const RX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // Notifiche

        let device, gattServer, txChar, rxChar;

        const connectBtn = document.getElementById('connect-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const terminal = document.getElementById('terminal');

        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const color = type === 'in' ? 'text-green-400' : (type === 'out' ? 'text-yellow-400' : 'text-slate-400');
            terminal.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function connect() {
            try {
                log("Ricerca dispositivo...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                log(`Trovato: ${device.name}`);
                statusText.innerText = "Connessione...";
                
                gattServer = await device.gatt.connect();
                const service = await gattServer.getPrimaryService(UART_SERVICE_UUID);
                
                txChar = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                rxChar = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);

                // Abilita le notifiche per ricevere dati
                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', handleNotifications);

                statusText.innerText = "Connesso";
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
                connectBtn.innerText = "Disconnetti";
                log("Comunicazione BLE Pronta!", 'info');

            } catch (error) {
                log("Errore: " + error, 'error');
                statusText.innerText = "Errore";
            }
        }

        function handleNotifications(event) {
            let value = event.target.value;
            let decoder = new TextDecoder('utf-8');
            // Nota: Chameleon usa pacchetti binari, qui lo mostriamo come Hex
            let hex = Array.from(new Uint8Array(value.buffer))
                           .map(b => b.toString(16).padStart(2, '0'))
                           .join(' ');
            log(`<- ${hex}`, 'in');
        }

        async function sendCommand(hexStr) {
            if (!txChar) return log("Non connesso!", 'error');
            
            // Converte stringa hex in buffer
            const bytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            await txChar.writeValue(bytes);
            log(`-> ${hexStr}`, 'out');
        }

        connectBtn.addEventListener('click', () => {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
                statusText.innerText = "Disconnesso";
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                connectBtn.innerText = "Connetti";
            } else {
                connect();
            }
        });

        function clearLog() { terminal.innerHTML = ""; }
    </script>
</body>
</html>
