<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Ultra - Coges Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: ui-sans-serif, system-ui; }
        .terminal { background: #000; border: 1px solid #1e293b; height: 350px; overflow-y: auto; font-family: 'Menlo', monospace; font-size: 0.8rem; border-radius: 12px; }
        .btn-action { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-action:active { transform: scale(0.95); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <header class="mb-6 mt-4">
            <h1 class="text-2xl font-black text-white tracking-tighter italic">CHAMELEON <span class="text-orange-500">B-READER</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em]">Coges & ISO 14443-B Interface</p>
        </header>

        <div class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800 mb-4">
            <div class="flex items-center justify-between">
                <div>
                    <div class="flex items-center gap-2">
                        <div id="status-dot" class="h-2 w-2 rounded-full bg-red-500"></div>
                        <span id="status-text" class="text-sm font-bold uppercase tracking-wider">Offline</span>
                    </div>
                    <p id="dev-info" class="text-[10px] text-slate-500 mt-1 italic">Nessun hardware rilevato</p>
                </div>
                <button id="connect-btn" class="bg-orange-600 hover:bg-orange-500 text-white text-xs font-black px-5 py-3 rounded-xl">
                    CONNETTI
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="scanCoges()" class="btn-action bg-slate-800 p-4 rounded-xl text-xs font-bold text-orange-400 border-orange-900/30">
                🔍 SCAN COGES (14443B)
            </button>
            <button id="loop-btn" onclick="toggleLoop()" class="btn-action bg-slate-800 p-4 rounded-xl text-xs font-bold text-blue-400">
                🔄 LOOP SCAN: OFF
            </button>
            <button onclick="sendChameleonCommand(1002)" class="btn-action bg-slate-800/50 p-3 rounded-xl text-[10px] text-slate-400">
                🔋 BATTERY
            </button>
            <button onclick="clearLog()" class="btn-action bg-slate-800/50 p-3 rounded-xl text-[10px] text-slate-400">
                🗑️ CLEAR LOG
            </button>
        </div>

        <div class="terminal p-4 shadow-2xl relative" id="terminal">
            <div class="text-[9px] text-slate-600 mb-2 border-b border-slate-900 pb-1">CONSOLE OUTPUT</div>
        </div>
        
        <div class="mt-4 p-3 bg-orange-950/20 border border-orange-900/20 rounded-lg">
            <p class="text-[10px] text-orange-200/50 leading-relaxed">
                <strong class="text-orange-400">INFO:</strong> Per leggere chiavi Coges, appoggiale al centro del dispositivo. Il protocollo 14443-B richiede un firmware Chameleon Ultra aggiornato.
            </p>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let device, txChar, rxChar;
        let isLooping = false;

        function log(msg, type = 'info') {
            const colors = { in: 'text-green-400', out: 'text-blue-400', err: 'text-red-500', info: 'text-slate-500' };
            const div = document.createElement('div');
            div.className = `${colors[type]} mb-1`;
            div.innerHTML = `<span class="text-[9px] opacity-40 font-sans">${new Date().toLocaleTimeString().split(' ')[0]}</span> ${msg}`;
            const term = document.getElementById('terminal');
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function connect() {
            try {
                log("Cercando Chameleon...", "info");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Chameleon' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txChar = await service.getCharacteristic(TX_UUID);
                rxChar = await service.getCharacteristic(RX_UUID);

                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', handleData);

                document.getElementById('status-text').innerText = "ONLINE";
                document.getElementById('status-dot').className = "h-2 w-2 rounded-full bg-green-500 status-pulse";
                document.getElementById('dev-info').innerText = device.name;
                document.getElementById('connect-btn').innerText = "STOP";
                log("Dispositivo pronto per 14443B", "in");
            } catch (e) {
                log("Errore: " + e.message, "err");
            }
        }

        function handleData(event) {
            const raw = new Uint8Array(event.target.value.buffer);
            // Protocollo Chameleon: Header 0x11 0xEF ...
            if (raw[0] === 0x11 && raw[1] === 0xEF) {
                const data = raw.slice(6, raw.length - 1);
                if (data.length > 1) {
                    const hex = Array.from(data).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                    log(`🎯 UID COGES: ${hex}`, "in");
                }
            }
        }

        async function sendChameleonCommand(cmdId, data = []) {
            if (!txChar) return log("Connetti prima!", "err");
            let frame = [0x11, 0xEF, cmdId & 0xFF, (cmdId >> 8) & 0xFF, data.length & 0xFF, (data.length >> 8) & 0xFF, ...data];
            let lrc = 0;
            for (let b of frame) lrc ^= b;
            frame.push(lrc);
            await txChar.writeValue(new Uint8Array(frame));
        }

        async function scanCoges() {
            log("Inviando comando SCAN (14443B)...", "out");
            // Comando 1014 (0x03F6) = HF_SCAN
            // Argomento 0x02 = ISO14443B
            await sendChameleonCommand(1014, [0x02]);
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loop-btn');
            if (isLooping) {
                btn.innerText = "🔄 LOOP SCAN: ON";
                btn.classList.add('bg-blue-900/50', 'text-blue-200');
                doLoop();
            } else {
                btn.innerText = "🔄 LOOP SCAN: OFF";
                btn.classList.remove('bg-blue-900/50', 'text-blue-200');
            }
        }

        async function doLoop() {
            while (isLooping && txChar) {
                await scanCoges();
                await new Promise(r => setTimeout(r, 1500)); // Aspetta 1.5 secondi tra una scansione e l'altra
            }
        }

        document.getElementById('connect-btn').addEventListener('click', () => {
            if (device?.gatt.connected) {
                device.gatt.disconnect();
                location.reload();
            } else {
                connect();
            }
        });

        function clearLog() { document.getElementById('terminal').innerHTML = ''; }
    </script>
</body>
</html>
